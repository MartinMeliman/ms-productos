# ════════════════════════════════════════════════════════════
#  ms-productos — application.yml
#  Perfiles: dev (local) y prod (Render)
#  Activar con: SPRING_PROFILES_ACTIVE=dev  o  =prod
# ════════════════════════════════════════════════════════════

server:
  port: ${PORT:8083}

spring:
  application:
    name: ms-productos
  profiles:
    active: dev  
    
  main:
    allow-bean-definition-overriding: true

# Registro en Eureka
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

# Swagger UI: http://localhost:8083/swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.marketplace: DEBUG

# ════════════════════════════════════════════════════════════
#  PERFIL DEV — desarrollo local (MySQL en localhost)
# ════════════════════════════════════════════════════════════
---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/db_productos?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
ms:
  usuarios:
    url: http://localhost:8081
  categorias:
    url: http://localhost:8084

# ════════════════════════════════════════════════════════════
#  PERFIL PROD — Render (variables de entorno, datos sensibles fuera)
# ════════════════════════════════════════════════════════════
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
ms:
  usuarios:
    url: ${MS_USUARIOS_URL}
  categorias:
    url: ${MS_CATEGORIAS_URL}
